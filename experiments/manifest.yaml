      - data/acosta_shocks.xlsx
      - data/cb_dictionary_v2.json
      - data/lm_dictionary.json
    key_finding: "J-test: direction model encompasses D_hawk model"
    notes: |
      BREAKTHROUGH: Davidson-MacKinnon J-test proves direction model
      (target×direction + path×direction) ENCOMPASSES D_hawk model.

  - id: v15_1_recovered_experiments
    version: "15.1"
    title: "Recover all experiments from repo + add new ones"
    date: 2026-06-09
    status: current
    input_data:
      - data/fomc_paper_regression_data.csv
    key_finding: "Direction model after all controls: target×dir t=2.83"
    recovered_from:
      - v12.5 (progressive controls)
      - v12.6 (ZLB structural break)
      - v12.8 (target² model)
      - v12.9 (full paper)
    new_experiments:
      - "Spanning test: CB predicts DXY beyond target+path (t=-2.16)"
      - "Calibration: +1σ target during hike → 12.5 net hawkish words → -8.7bp DXY"
      - "LM% placebo: both interactions insignificant (t=-1.05, -0.98)"
      - "HAC size distortion: 3.6× for target×dir, 5.6× for path×dir"
    notes: |
      10 experiments total. Direction model robust to all controls.
      HAC over-rejection severe → rely on permutation/bootstrap.
