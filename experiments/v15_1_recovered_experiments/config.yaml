# Experiment: v15.1 — Direction-Interaction Model (Current Best)
# This is the "latest and best" as of 2026-06-09

id: v15_1_recovered_experiments
version: "15.1"
title: "Direction-interaction model with full robustness"
date: 2026-06-09
status: current
parent: v15_0_direction

# ── Input Data ──
input_data:
  primary:
    - path: data/fomc_paper_regression_data.csv
      description: "Main regression dataset (FOMC meetings × variables)"
    - path: data/acosta_shocks.xlsx
      description: "Acosta (2024) high-frequency monetary policy shocks"
    - path: data/cb_dictionary_v2.json
      description: "Central bank dictionary v2 (hawkish/dovish words)"
    - path: data/lm_dictionary.json
      description: "Full Loughran-McDonald dictionary (347+2345 words)"
  supplementary:
    - path: data/fomc_statements_all.json
      description: "All FOMC statement texts"
    - path: data/fomc_master_extended.csv
      description: "Extended master dataset with ZLB break"

# ── Model Specification ──
model:
  primary: "CB ~ target×direction + path×direction"
  direction_variable: "hike/cut/hold (policy intent from LLM classification)"
  controls:
    - "Progressive controls (6 columns): size, BM, momentum, volatility"
    - "Statement length (total_words)"
    - "Alternative sentiment: hawkish-dovish, hawkish/dovish ratio"
  inference:
    - "Wild bootstrap (Rademacher weights, 5000 replications)"
    - "Permutation test for robustness"
    - "HAC with Newey-West lags = int(T^(1/3))"

# ── Key Results ──
results:
  primary_model:
    target_x_direction: { t: 2.83, p: "<0.01" }
    path_x_direction: { t: -1.91, p: "0.056" }
  
  j_test:
    description: "Davidson-MacKinnon J-test: direction model encompasses D_hawk"
    result: "Direction model ENCOMPASSES D_hawk (p<0.05)"
  
  spanning_test:
    description: "CB predicts DXY beyond target+path"
    t: -2.16
  
  placebo:
    description: "LM% placebo for direction model"
    target_x_dir: { t: -1.05, significant: false }
    path_x_dir: { t: -0.98, significant: false }
  
  hac_distortion:
    target_x_dir: "3.6× over-rejection"
    path_x_dir: "5.6× over-rejection"
    note: "Rely on permutation/bootstrap, not HAC p-values"
  
  calibration:
    description: "+1σ target during hike → 12.5 net hawkish words → -8.7bp DXY"
  
  subsample_stability: "Leave-one-year-out: direction model stable"

# ── What This Supersedes ──
supersedes:
  - v14.1 (D_hawk interaction — direction is more general)
  - v13.4 (quadratic — fails wild bootstrap p=0.076)
  - v12.9 (full paper — pre-audit)
  - v10.4 (CB-only — no interaction)

# ── Reproduce ──
reproduce:
  step_1: "Ensure data/fomc_paper_regression_data.csv exists"
  step_2: "Run regression: CB ~ target*direction + path*direction"
  step_3: "Wild bootstrap with 5000 replications"
  step_4: "J-test against D_hawk model"
  note: "Full build script pending — currently generated by agent"
