# FOMC Dynamic Stress Test System — Configuration
# All parameters calibrated from Xu & Zhang (2026) v7.2

regime:
  zlb_start: "2008-12-16"
  zlb_end: "2015-12-16"
  zlb2_start: "2020-03-15"
  zlb2_end: "2022-03-16"
  fasthike_start: "2022-03-16"
  fasthike_end: "2023-07-26"

fomc_signals:
  dovish_spread:
    non_zlb: -0.82
    zlb: +0.18
  hawkish_spread:
    non_zlb: +0.30
    zlb: -1.00

channels:
  nim:
    dovish_nim: -0.3732
    dovish_zlb_nim: +0.6765
    fasthike_nim: -0.9661
  cre:
    dovish_cre: -0.0162
    dovish_zlb_cre: +0.2469
    fasthike_cre: +0.6826
  htm:
    fasthike_htm: -0.0933
    fasthike_htm_securities: -0.053
    fasthike_afs: +0.0003

correlation:
  non_zlb_fomc: 0.68
  zlb_fomc: 0.86
  non_zlb_nonfomc: 0.55
  zlb_nonfomc: 0.75

covar:
  non_zlb_baseline: 1.0
  zlb_amplification: 2.09

reverse_stress:
  zlb_dovish_7yr:
    mean_cum_car: +17.8
    p_loss: 16.2
  zlb_hawkish_7yr:
    mean_cum_car: -22.5
    p_loss: 88.5
    p_loss_gt10: 75.2
  most_vulnerable: "Citi (P(loss)=57.9%)"

uncertainty:
  # Inner Confidence thresholds (Chen et al. 2025, NBER #34965)
  confidence_thresholds:
    low: 0.85       # > 0.85 = Low uncertainty
    moderate: 0.65  # 0.65-0.85 = Moderate
    high: 0.45      # 0.45-0.65 = High
    # < 0.45 = Extreme
  volatility_multipliers:
    Low: 1.0
    Moderate: 1.25
    High: 1.55
    Extreme: 1.90
  correlation_adjustments:
    Low: 0.0
    Moderate: 0.03
    High: 0.07
    Extreme: 0.12
  spread_widening_bps:
    Low: 0
    Moderate: 5
    High: 15
    Extreme: 35
  capital_buffer_surcharge_pct:
    Low: 0.0
    Moderate: 0.1
    High: 0.3
    Extreme: 0.6
  regime_transition:
    confidence_drop_threshold: 0.15
    # Sigmoid: P(transition) = 1/(1+exp(-8*(drop-0.20)))

cross_border:
  japan_multiplier: 1.57
  dollar_funding_channel: true
  exchange_rate_channel: true

